<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本刮刮地圖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pink:#FFC7D5;--pink-deep:#FF8FB1;--pink-soft:#FFF0F5;--ink:#3D3142;--muted:#8E6E7E;--line:#2F2634;--label-blue:#10288C;--mint:#BDEFE8;--yellow:#FFE89A;--blue:#BFDFFF;--white:#FFFFFF}
body{background:var(--white);color:var(--ink);font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;background-image:radial-gradient(circle at 18px 18px,rgba(255,199,213,.42) 0 6px,transparent 7px),radial-gradient(circle at 58px 52px,rgba(189,239,232,.36) 0 5px,transparent 6px);background-size:92px 92px}
header{position:relative;text-align:center;padding:26px 20px 10px;width:100%;background:linear-gradient(180deg,var(--pink-soft) 0%,rgba(255,255,255,.86) 100%);border-bottom:3px solid var(--line);overflow:hidden}
header:before,header:after{content:"";position:absolute;width:92px;height:44px;background:var(--white);border:3px solid var(--line);border-radius:44px;top:18px;opacity:.9}
header:before{left:7%;box-shadow:38px 3px 0 -10px var(--white),-28px 8px 0 -14px var(--white)}
header:after{right:8%;box-shadow:-34px 5px 0 -10px var(--white),26px 8px 0 -14px var(--white)}
h1{position:relative;font-size:2em;color:var(--ink);text-shadow:3px 3px 0 var(--pink);letter-spacing:0;font-weight:900}
.subtitle{position:relative;color:var(--muted);font-size:0.9em;margin-top:6px;font-weight:700}
.container{display:flex;gap:20px;padding:18px 20px 28px;max-width:1200px;width:100%;align-items:flex-start;flex-wrap:wrap}
.map-wrap{position:relative;flex:1;min-width:340px;background:var(--white);border:3px solid var(--line);border-radius:8px;padding:16px;box-shadow:8px 8px 0 var(--pink)}
.map-wrap:before{content:"";position:absolute;inset:9px;border:2px dashed rgba(255,143,177,.45);border-radius:7px;pointer-events:none}
.map-title{position:relative;display:inline-block;left:50%;transform:translateX(-50%);font-size:0.82em;color:var(--ink);background:var(--pink);border:3px solid var(--line);border-radius:999px;padding:7px 14px;text-align:center;margin-bottom:12px;font-weight:900}
.zoom-tools{position:absolute;right:24px;top:66px;z-index:4;display:flex;flex-direction:column;gap:7px}
.zbtn{width:34px;height:34px;border:3px solid var(--line);border-radius:8px;background:var(--white);color:var(--ink);box-shadow:3px 3px 0 var(--pink);font-size:1.05em;font-weight:900;line-height:1;cursor:pointer}
.zbtn:hover{background:var(--pink);transform:translate(1px,1px);box-shadow:2px 2px 0 var(--pink)}
svg{width:100%;height:auto;display:block;touch-action:none;cursor:grab;user-select:none}
svg.dragging{cursor:grabbing}
.map-bg{fill:#FFF8FB;stroke:#F4D4DE;stroke-width:3;vector-effect:non-scaling-stroke}
.hit{fill:transparent;stroke:none;pointer-events:all;cursor:pointer}
.country-piece{display:none}
.pref{cursor:pointer;transition:fill 0.2s,filter 0.2s;stroke:none}
.pref.unvisited{fill:#F4FBFC}
.pref.unvisited:hover,.pref.unvisited.hovered{fill:var(--pink);filter:drop-shadow(1px 2px 0 rgba(61,49,66,.18))}
.pref.visited{fill:var(--pink)}
.pref.visited:hover,.pref.visited.hovered{fill:#FFB0C7;filter:drop-shadow(1px 2px 0 rgba(61,49,66,.18))}
.pref.has-content{fill:var(--pink-deep)}
.pref.has-content:hover,.pref.has-content.hovered{fill:#FF7FA5;filter:drop-shadow(1px 2px 0 rgba(61,49,66,.18))}
.border-line{fill:none;stroke:var(--line);stroke-width:0.72;stroke-linejoin:round;stroke-linecap:round;vector-effect:non-scaling-stroke;pointer-events:none}
.country-outline{fill:none;stroke:var(--line);stroke-width:1.75;stroke-linejoin:round;stroke-linecap:round;vector-effect:non-scaling-stroke;pointer-events:none}
.plabel{font-size:5.8px;fill:var(--label-blue);pointer-events:none;text-anchor:middle;dominant-baseline:central;font-family:'Noto Sans TC','PingFang TC',Arial,sans-serif;font-weight:900;opacity:0.92}
.plabel.dark{fill:var(--label-blue);opacity:0.72}
.plabel.hidden{display:none}
.divider-label{font-size:5px;fill:var(--muted);text-anchor:middle;font-weight:800}
.stats{width:270px;display:flex;flex-direction:column;gap:14px}
.card{background:var(--white);border:3px solid var(--line);border-radius:8px;padding:14px;box-shadow:6px 6px 0 var(--pink);position:relative}
.card:nth-child(2){box-shadow:6px 6px 0 var(--mint)}
.card:nth-child(3){box-shadow:6px 6px 0 var(--yellow)}
.card h3{color:var(--ink);font-size:0.92em;letter-spacing:0;margin-bottom:10px;border-bottom:3px solid var(--pink);padding-bottom:7px;font-weight:900}
.prog-bar{background:#FFF8FB;border-radius:999px;height:18px;overflow:hidden;margin-bottom:8px;border:3px solid var(--line)}
.prog-fill{background:repeating-linear-gradient(45deg,var(--pink) 0 10px,#FFB0C7 10px 20px);height:100%;border-radius:999px;transition:width 0.6s ease}
.prog-text{font-size:0.82em;color:var(--muted);font-weight:800}
.region-list{list-style:none}
.region-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:2px dashed #F4D4DE;font-size:0.8em;color:var(--ink);font-weight:800}
.region-row .cnt{color:var(--ink);background:var(--pink-soft);border:2px solid var(--line);border-radius:999px;padding:1px 8px}
.vlist{max-height:280px;overflow-y:auto}
.vitem{display:flex;align-items:center;gap:8px;padding:7px 6px;border-bottom:2px dashed #F4D4DE;cursor:pointer;border-radius:6px;font-weight:800}
.vitem:hover{background:var(--pink-soft)}
.vdot{width:10px;height:10px;border-radius:50%;background:var(--pink-deep);border:2px solid var(--line);flex-shrink:0}
.vname{font-size:0.82em;color:var(--ink)}
.vnote{font-size:0.72em;color:var(--pink-deep);margin-left:auto;flex-shrink:0}
.empty-msg{color:var(--muted);font-size:0.82em;text-align:center;padding:18px 8px;line-height:1.6;font-weight:800}
.cloud-card{display:flex;flex-direction:column;gap:10px}
.cloud-status{display:inline-flex;width:max-content;max-width:100%;align-items:center;border:2px solid var(--line);border-radius:999px;background:var(--pink-soft);color:var(--ink);padding:4px 10px;font-size:.76em;font-weight:900}
.cloud-user{color:var(--muted);font-size:.82em;font-weight:800;line-height:1.5;word-break:break-word}
.cloud-actions{display:flex;gap:8px;flex-wrap:wrap}
.cloud-group{display:flex;flex-direction:column;gap:7px;margin-top:2px}
.cloud-hint{color:var(--muted);font-size:.74em;line-height:1.55;font-weight:800}
.overlay{display:none;position:fixed;inset:0;background:rgba(61,49,66,0.28);z-index:1000;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--white);border:3px solid var(--line);border-radius:8px;padding:22px;width:92%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:10px 10px 0 var(--pink)}
.mhead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.mtitle{color:var(--ink);font-size:1.35em;line-height:1.3;font-weight:900;text-shadow:2px 2px 0 var(--pink)}
.mregion{color:var(--muted);font-size:0.82em;margin-top:3px;font-weight:800}
.mclose{background:var(--pink-soft);border:3px solid var(--line);border-radius:50%;color:var(--ink);font-size:1.2em;cursor:pointer;line-height:1;padding:0;width:30px;height:30px;font-weight:900}
.mclose:hover{background:var(--pink)}
.fgroup{margin-bottom:14px}
label{display:block;color:var(--ink);font-size:0.82em;margin-bottom:6px;font-weight:900}
textarea{width:100%;background:#FFF8FB;border:3px solid var(--line);border-radius:8px;color:var(--ink);padding:10px;font-size:0.9em;resize:vertical;min-height:82px;font-family:inherit;font-weight:700}
textarea:focus{outline:none;border-color:var(--pink-deep);box-shadow:0 0 0 4px rgba(255,199,213,.45)}
.upload-zone{border:3px dashed var(--line);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:background 0.2s,transform 0.2s;color:var(--muted);font-size:0.86em;background:var(--pink-soft);font-weight:900}
.upload-zone:hover{background:var(--pink);transform:translateY(-1px)}
.upload-zone input{display:none}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.pthumb{position:relative;aspect-ratio:1}
.pthumb img{width:100%;height:100%;object-fit:cover;border-radius:8px;border:3px solid var(--line)}
.premove{position:absolute;top:3px;right:3px;background:var(--pink-deep);border:2px solid var(--line);color:var(--white);width:19px;height:19px;border-radius:50%;cursor:pointer;font-size:0.7em;display:flex;align-items:center;justify-content:center;font-weight:900}
.premove:hover{background:#E95780}
.place-row{display:flex;gap:7px;align-items:center}
.place-row input{flex:1;min-width:0;background:#FFF8FB;border:3px solid var(--line);border-radius:8px;color:var(--ink);padding:9px;font-size:0.86em;font-family:inherit;font-weight:800}
.place-row input:focus{outline:none;border-color:var(--pink-deep);box-shadow:0 0 0 4px rgba(255,199,213,.45)}
.place-list{display:flex;flex-direction:column;gap:7px;margin-top:9px}
.place-item{display:flex;align-items:center;gap:8px;background:#FFF8FB;border:2px solid var(--line);border-radius:8px;padding:7px 8px;font-size:0.82em;font-weight:900}
.place-item a{color:var(--label-blue);text-decoration:none;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.place-item a:hover{text-decoration:underline}
.place-remove{background:var(--white);border:2px solid var(--line);border-radius:50%;width:22px;height:22px;cursor:pointer;font-weight:900;color:#C43F68;line-height:1}
.mactions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:6px}
.btn{padding:9px 16px;border-radius:8px;border:3px solid var(--line);cursor:pointer;font-size:0.86em;transition:all 0.18s;font-family:inherit;font-weight:900;box-shadow:3px 3px 0 var(--line)}
.btn:hover{transform:translate(1px,1px);box-shadow:2px 2px 0 var(--line)}
.btn-gold{background:var(--pink);color:var(--ink)}
.btn-gold:hover{background:var(--pink-deep)}
.btn-out{background:var(--white);color:var(--ink)}
.btn-out:hover{background:var(--pink-soft)}
.btn-red{background:#FFE5EA;color:#C43F68;margin-right:auto}
.btn-red:hover{background:#FFD0DC;color:#9E244B}
.tip{position:fixed;background:var(--white);border:3px solid var(--line);color:var(--ink);padding:8px 11px;border-radius:8px;font-size:0.78em;pointer-events:none;z-index:500;display:none;max-width:190px;line-height:1.5;box-shadow:4px 4px 0 var(--pink);font-weight:800}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--pink-soft)}
::-webkit-scrollbar-thumb{background:var(--pink);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--pink-deep)}

/* Minimal premium refresh */
:root{
  --ink:#1D1D1F;
  --muted:#6E6E73;
  --line:#D7D2D5;
  --hairline:rgba(29,29,31,.12);
  --panel:rgba(255,255,255,.82);
  --wash:#FFF7FA;
}
body{
  background:
    radial-gradient(circle at 50% -20%,rgba(255,199,213,.58),rgba(255,255,255,0) 38%),
    linear-gradient(180deg,#FFFFFF 0%,#FFF8FB 45%,#FFFFFF 100%);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif;
  letter-spacing:0;
  overflow-x:hidden;
}
header,.container,.tip{position:relative;z-index:1}
.decor-layer{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
}
.decor{
  position:absolute;
  width:var(--w);
  left:var(--x);
  top:var(--y);
  transform:rotate(var(--r));
  opacity:var(--o,.24);
  mix-blend-mode:multiply;
  filter:saturate(.82) contrast(.96);
  border-radius:24px;
  user-select:none;
}
.decor.d1{--w:180px;--x:4%;--y:18%;--r:-12deg;--o:.24}
.decor.d2{--w:132px;--x:82%;--y:11%;--r:9deg;--o:.22}
.decor.d3{--w:150px;--x:72%;--y:72%;--r:-8deg;--o:.20}
.decor.d4{--w:128px;--x:10%;--y:76%;--r:11deg;--o:.19}
.decor.d5{--w:120px;--x:88%;--y:52%;--r:15deg;--o:.18}
.decor.d6{--w:110px;--x:2%;--y:56%;--r:7deg;--o:.18}
.decor.d7{--w:148px;--x:56%;--y:8%;--r:-10deg;--o:.20}
.decor.d8{--w:108px;--x:34%;--y:86%;--r:-14deg;--o:.17}
.decor.d9{--w:160px;--x:91%;--y:78%;--r:8deg;--o:.16}
.decor.d10{--w:118px;--x:20%;--y:10%;--r:13deg;--o:.18}
.decor.d11{--w:130px;--x:48%;--y:66%;--r:-6deg;--o:.17}
header{
  padding:42px 24px 22px;
  background:rgba(255,255,255,.76);
  border-bottom:1px solid var(--hairline);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
}
header:before,header:after{display:none}
h1{
  font-size:clamp(2.5rem,6vw,5.4rem);
  line-height:.96;
  font-weight:800;
  color:var(--ink);
  text-shadow:none;
}
.subtitle{
  color:var(--muted);
  font-size:clamp(.95rem,1.8vw,1.18rem);
  font-weight:500;
  margin-top:18px;
}
.container{
  max-width:1380px;
  gap:28px;
  padding:34px 28px 54px;
}
.map-wrap{
  min-width:min(100%,520px);
  background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(255,247,250,.82));
  border:1px solid var(--hairline);
  border-radius:24px;
  padding:22px;
  box-shadow:0 28px 80px rgba(255,143,177,.20),0 4px 18px rgba(29,29,31,.06);
  overflow:hidden;
}
.map-wrap:before{display:none}
.map-title{
  left:auto;
  transform:none;
  display:block;
  width:max-content;
  max-width:calc(100% - 104px);
  margin:0 auto 16px;
  padding:8px 16px;
  border:1px solid rgba(255,143,177,.34);
  border-radius:999px;
  background:rgba(255,199,213,.35);
  color:#8F3F5D;
  font-size:.78rem;
  font-weight:600;
}
.zoom-tools{
  top:24px;
  right:24px;
  gap:8px;
}
.zbtn{
  width:38px;
  height:38px;
  border:1px solid var(--hairline);
  border-radius:50%;
  background:rgba(255,255,255,.88);
  color:var(--ink);
  box-shadow:0 8px 24px rgba(29,29,31,.08);
  font-size:1rem;
  font-weight:600;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}
.zbtn:hover{
  background:var(--pink);
  transform:none;
  box-shadow:0 10px 28px rgba(255,143,177,.28);
}
.map-bg{fill:rgba(255,255,255,.38);stroke:rgba(255,199,213,.26);stroke-width:1}
.pref.unvisited{fill:#FAFEFF}
.pref.unvisited:hover,.pref.unvisited.hovered{fill:var(--pink)}
.border-line{stroke:#2C2C2E;stroke-width:.58}
.country-outline{stroke:#2C2C2E;stroke-width:1.2}
.stats{
  width:300px;
  gap:16px;
}
.card{
  background:var(--panel);
  border:1px solid var(--hairline);
  border-radius:22px;
  padding:18px;
  box-shadow:0 18px 48px rgba(29,29,31,.06);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
}
.card:nth-child(2),.card:nth-child(3){box-shadow:0 18px 48px rgba(29,29,31,.06)}
.card h3{
  color:var(--ink);
  font-size:.86rem;
  font-weight:700;
  border-bottom:1px solid rgba(255,199,213,.75);
  padding-bottom:10px;
  margin-bottom:12px;
}
.prog-bar{
  height:8px;
  background:#F5F5F7;
  border:0;
  border-radius:999px;
}
.prog-fill{
  background:linear-gradient(90deg,#FFC7D5,#FF8FB1);
  border-radius:999px;
}
.prog-text,.region-row,.vname,.empty-msg{
  color:var(--muted);
  font-weight:500;
}
.region-row{
  border-bottom:1px solid rgba(29,29,31,.08);
  padding:9px 0;
}
.region-row .cnt{
  border:1px solid rgba(255,143,177,.32);
  background:rgba(255,199,213,.24);
  color:#8F3F5D;
  font-weight:600;
}
.vitem{
  border-bottom:1px solid rgba(29,29,31,.08);
  border-radius:12px;
  font-weight:500;
}
.vitem:hover{background:rgba(255,199,213,.20)}
.vdot{background:var(--pink-deep);border:0}
.cloud-status{
  border:1px solid rgba(255,143,177,.32);
  background:rgba(255,199,213,.22);
  color:#8F3F5D;
  font-weight:650;
}
.cloud-user,.cloud-hint{font-weight:500}
.overlay{
  position:fixed;
  inset:0;
  z-index:1000;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:rgba(245,245,247,.56);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}
.overlay.on{display:flex}
.modal{
  border:1px solid var(--hairline);
  border-radius:26px;
  padding:26px;
  width:min(92vw,480px);
  max-height:min(90vh,720px);
  overflow-y:auto;
  box-shadow:0 32px 90px rgba(29,29,31,.18);
}
.mtitle{
  text-shadow:none;
  font-weight:760;
  color:var(--ink);
}
.mregion,label{color:var(--muted);font-weight:600}
.mclose{
  border:1px solid var(--hairline);
  background:#F5F5F7;
  color:var(--ink);
}
textarea,.place-row input{
  background:#FAFAFC;
  border:1px solid var(--hairline);
  border-radius:16px;
  font-weight:500;
}
textarea:focus,.place-row input:focus{
  border-color:rgba(255,143,177,.9);
  box-shadow:0 0 0 4px rgba(255,199,213,.35);
}
.upload-zone{
  border:1px dashed rgba(255,143,177,.75);
  border-radius:18px;
  background:rgba(255,199,213,.16);
  color:#8F3F5D;
  font-weight:600;
}
.upload-zone:hover{background:rgba(255,199,213,.30);transform:none}
.pthumb img{border:1px solid var(--hairline);border-radius:14px}
.place-item{border:1px solid var(--hairline);border-radius:14px;background:#FAFAFC}
.btn{
  border:1px solid var(--hairline);
  border-radius:999px;
  box-shadow:none;
  font-weight:650;
}
.btn:hover{transform:none;box-shadow:none}
.btn-gold{background:var(--pink);color:var(--ink);border-color:transparent}
.btn-out{background:#F5F5F7;color:var(--ink)}
.btn-red{background:#FFF1F5;color:#B8325A;border-color:rgba(255,143,177,.35)}
.tip{
  border:1px solid var(--hairline);
  border-radius:16px;
  box-shadow:0 16px 40px rgba(29,29,31,.12);
  font-weight:600;
}
@media(max-width:760px){
  .decor{opacity:.13}
  .decor.d2,.decor.d5,.decor.d8,.decor.d9{display:none}
  .decor.d1{--w:120px;--x:-8%;--y:18%}
  .decor.d3{--w:112px;--x:74%;--y:70%}
  .decor.d4{--w:96px;--x:4%;--y:82%}
  header{padding:34px 18px 18px}
  .container{padding:20px 14px 36px;gap:18px}
  .map-wrap{min-width:100%;padding:14px;border-radius:20px}
  .map-title{max-width:calc(100% - 96px);font-size:.72rem}
  .stats{width:100%}
}
</style>
</head>
<body>
<div class="decor-layer" aria-hidden="true">
  <img class="decor d1" src="japanese-icons/sakura.jpg" alt="">
  <img class="decor d2" src="japanese-icons/lantern.jpg" alt="">
  <img class="decor d3" src="japanese-icons/fan-bottom.jpg" alt="">
  <img class="decor d4" src="japanese-icons/fuji.jpg" alt="">
  <img class="decor d5" src="japanese-icons/daruma.jpg" alt="">
  <img class="decor d6" src="japanese-icons/koinobori.jpg" alt="">
  <img class="decor d7" src="japanese-icons/fan-top.jpg" alt="">
  <img class="decor d8" src="japanese-icons/flag.jpg" alt="">
  <img class="decor d9" src="japanese-icons/pagoda.jpg" alt="">
  <img class="decor d10" src="japanese-icons/torii.jpg" alt="">
  <img class="decor d11" src="japanese-icons/cat.jpg" alt="">
</div>
<header>
  <h1>&#9992; 日本刮刮地圖</h1>
  <p class="subtitle">刮開你的日本旅程 &bull; 47 個都道府縣</p>
</header>
<div class="container">
  <div class="map-wrap">

let data=JSON.parse(localStorage.getItem("jsm2")||"{}");
let cur=null,curPhotos=[],curPlaces=[];
const svg=document.getElementById("map");
const INIT_VIEW={x:0,y:0,w:540,h:680};
const MIN_VIEW_W=120;
const MAX_VIEW_W=540;
const BASE_LABEL_SIZE=5.8;
let view={...INIT_VIEW};
let drag=null;
let suppressClick=false;
let openedFromPointer=false;
function numsFromPath(d){return(d.match(/-?\d+(?:\.\d+)?/g)||[]).map(Number);}
function bboxFromNums(nums){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(let i=0;i<nums.length;i+=2){
    const x=nums[i],y=nums[i+1];
    minX=Math.min(minX,x);minY=Math.min(minY,y);maxX=Math.max(maxX,x);maxY=Math.max(maxY,y);
  }
  return{minX,minY,maxX,maxY,w:maxX-minX,h:maxY-minY};
}
function labelBox(p){
  const nums=numsFromPath(p.d);
  const near=[];
  for(let i=0;i<nums.length;i+=2){
    const x=nums[i],y=nums[i+1];
    if(Math.abs(x-p.lx)<=34&&Math.abs(y-p.ly)<=34){near.push(x,y);}
  }
  return bboxFromNums(near.length>=6?near:nums);
}
GEO.forEach(p=>{p.sd=p.d;p.labelBox=labelBox(p);});
function cls(p){const v=!!data[p.id];const hc=v&&(data[p.id].note||data[p.id].photos?.length||data[p.id].places?.length);return"pref "+(v?(hc?"has-content":"visited"):"unvisited");}
function zoomLevel(){return INIT_VIEW.w/view.w;}
function applyView(){
  const z=zoomLevel();
  svg.setAttribute("viewBox",[view.x,view.y,view.w,view.h].map(n=>n.toFixed(2)).join(" "));
  updateLabels(z);
}
function clampView(){
  view.w=Math.max(MIN_VIEW_W,Math.min(MAX_VIEW_W,view.w));
  view.h=view.w*INIT_VIEW.h/INIT_VIEW.w;
  view.x=Math.max(INIT_VIEW.x,Math.min(INIT_VIEW.x+INIT_VIEW.w-view.w,view.x));
  view.y=Math.max(INIT_VIEW.y,Math.min(INIT_VIEW.y+INIT_VIEW.h-view.h,view.y));
}
function setZoom(nextZoom,cx=INIT_VIEW.w/2,cy=INIT_VIEW.h/2){
  const oldW=view.w,oldH=view.h;
  const newW=INIT_VIEW.w/Math.max(1,Math.min(INIT_VIEW.w/MIN_VIEW_W,nextZoom));
  const newH=newW*INIT_VIEW.h/INIT_VIEW.w;
  const rx=(cx-view.x)/oldW,ry=(cy-view.y)/oldH;
  view.x=cx-rx*newW;view.y=cy-ry*newH;view.w=newW;view.h=newH;
  clampView();applyView();
}
function resetZoom(){view={...INIT_VIEW};applyView();}
function updateLabels(z=zoomLevel()){
  const screenGrow=Math.min(1.8,1+0.22*(z-1));
  const size=BASE_LABEL_SIZE*screenGrow/z;
  document.querySelectorAll(".plabel").forEach(t=>{
    const p=GEO.find(x=>x.id===+t.dataset.id);
    if(!p)return;
    const chars=p.n.length;
    const needW=chars*size*1.1+8/z;
    const needH=size*2.15;
    const horizontalFits=p.labelBox.w>=needW*1.08;
    const verticalFits=p.labelBox.h>=needH*1.02&&p.clear>=(needH/2+1.1/z);
    const fits=horizontalFits&&verticalFits;
    t.style.fontSize=size.toFixed(2)+"px";
    t.classList.toggle("hidden",!fits);
  });
}
function buildMap(){
  svg.innerHTML="";
  const paper=document.createElementNS("http://www.w3.org/2000/svg","rect");
  paper.setAttribute("x","18");paper.setAttribute("y","12");
  paper.setAttribute("width","504");paper.setAttribute("height","654");
  paper.setAttribute("rx","18");paper.setAttribute("class","map-bg");
  svg.appendChild(paper);
  const ir=document.createElementNS("http://www.w3.org/2000/svg","rect");
  ir.setAttribute("x","18");ir.setAttribute("y","608");
  ir.setAttribute("width","110");ir.setAttribute("height","58");
  ir.setAttribute("fill","none");ir.setAttribute("stroke","#2F2634");
  ir.setAttribute("stroke-width","2.2");ir.setAttribute("stroke-dasharray","6,4");ir.setAttribute("rx","10");
  svg.appendChild(ir);
  const il=document.createElementNS("http://www.w3.org/2000/svg","text");
  il.setAttribute("x","73");il.setAttribute("y","618");
  il.setAttribute("class","divider-label");il.textContent="（沖繩）";svg.appendChild(il);
  const fillLayer=document.createElementNS("http://www.w3.org/2000/svg","g");
  const borderLayer=document.createElementNS("http://www.w3.org/2000/svg","g");
  const labelLayer=document.createElementNS("http://www.w3.org/2000/svg","g");
  svg.appendChild(fillLayer);svg.appendChild(borderLayer);svg.appendChild(labelLayer);
  GEO.forEach(p=>{
    const g=document.createElementNS("http://www.w3.org/2000/svg","g");
    const v=!!data[p.id];
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",p.sd);
    path.setAttribute("class",cls(p));path.dataset.id=p.id;
    addEv(path,p);
    const border=document.createElementNS("http://www.w3.org/2000/svg","path");
    border.setAttribute("d",p.sd);
    border.setAttribute("class","border-line");
    const hit=document.createElementNS("http://www.w3.org/2000/svg","circle");
    hit.setAttribute("cx",p.lx);hit.setAttribute("cy",p.ly);
    hit.setAttribute("r",p.id===47?"7":"9");hit.setAttribute("class","hit");
    hit.dataset.id=p.id;addEv(hit,p);
    const t=mklabel(p.lx,p.ly,p.n,v);
    t.dataset.id=p.id;
    g.appendChild(path);g.appendChild(hit);
    fillLayer.appendChild(g);
    borderLayer.appendChild(border);
    labelLayer.appendChild(t);
  });
  applyView();
}
function mklabel(x,y,name,visited){
  const t=document.createElementNS("http://www.w3.org/2000/svg","text");
  t.setAttribute("x",x);t.setAttribute("y",y);
  t.setAttribute("class","plabel"+(visited?"":" dark"));

  return t;
}
const tip=document.getElementById("tip");
function setPrefHover(id,on){
  const pref=svg.querySelector('.pref[data-id="'+id+'"]');
  if(pref)pref.classList.toggle("hovered",on);
}
function addEv(el,p){
  el.addEventListener("mouseenter",e=>{
    setPrefHover(p.id,true);
    const d=data[p.id];
    tip.innerHTML="<strong>"+p.n+"</strong> &bull; "+p.r+(d?"<br><span style='color:#FF6F9A'>&#10003; 已造訪</span>"+(d.note?"<br><span style='color:#8E6E7E;font-size:.9em'>有筆記</span>":"")+(d.places?.length?"<br><span style='color:#10288C;font-size:.9em'>有 Google Maps 地點</span>":""):"");
    tip.style.display="block";tip.style.left=(e.clientX+13)+"px";tip.style.top=(e.clientY-8)+"px";
  });
  el.addEventListener("mousemove",e=>{tip.style.left=(e.clientX+13)+"px";tip.style.top=(e.clientY-8)+"px";});

}
const ov=document.getElementById("ov");
function openModal(p){
  cur=p;
  const d=data[p.id]||{};
  curPhotos=[...(d.photos||[])];
  curPlaces=[...(d.places||[])];
  document.getElementById("mtitle").textContent=p.n;
  document.getElementById("mregion").textContent=p.r+"地區"+(d.visitedAt?" · 造訪於 "+new Date(d.visitedAt).toLocaleDateString("zh-Hant"):"");

function closeModal(){ov.classList.remove("on");cur=null;curPhotos=[];curPlaces=[];}
function renderPhotos(){

  ).join("");
}
window.removePhoto=function(i){curPhotos.splice(i,1);renderPhotos();};
function isUrl(text){return /^https?:\/\//i.test(text);}
function placeLabel(place){
  if(typeof place==="string")return place;
  return place.name||place.url||"Google Maps 地點";
}
function placeHref(place){
  if(typeof place==="object"&&place.url)return place.url;
  const text=placeLabel(place);
  return isUrl(text)?text:"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(text+" "+cur.n+" 日本");
}
function renderPlaces(){
  document.getElementById("placeList").innerHTML=curPlaces.map((place,i)=>
    '<div class="place-item"><a href="'+placeHref(place)+'" target="_blank" rel="noopener">'+placeLabel(place)+'</a><button class="place-remove" onclick="removePlace('+i+')" type="button">&#10005;</button></div>'
  ).join("");
}
window.removePlace=function(i){curPlaces.splice(i,1);renderPlaces();};
function addPlace(){
  const input=document.getElementById("placeName");
  const raw=input.value.trim();
  if(!raw)return;
  curPlaces.push(isUrl(raw)?{name:"Google Maps 地點",url:raw}:raw);
  input.value="";
  renderPlaces();
}
function resizeImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=reject;
    reader.onload=()=>{
      const img=new Image();
      img.onerror=reject;
      img.onload=()=>{
        const max=1100;
        const scale=Math.min(1,max/Math.max(img.width,img.height));
        const canvas=document.createElement("canvas");
        canvas.width=Math.max(1,Math.round(img.width*scale));
        canvas.height=Math.max(1,Math.round(img.height*scale));
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL("image/jpeg",0.78));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}
async function addPhotoFiles(files){
  for(const f of Array.from(files).filter(file=>file.type.startsWith("image/"))){
    try{
      curPhotos.push(await resizeImage(f));
      renderPhotos();
    }catch(err){
      alert("有一張照片無法加入，請試試其他圖片。");
    }
  }
}
function saveData(){
  const id=cur.id;
  data[id]={visited:true,note:document.getElementById("note").value.trim(),photos:[...curPhotos],places:[...curPlaces],visitedAt:data[id]?.visitedAt||new Date().toISOString()};
  try{
    localStorage.setItem("jsm2",JSON.stringify(data));
    window.JSM_CLOUD?.save?.(data);
    buildMap();updateStats();closeModal();
  }catch(err){
    alert("儲存失敗：照片太多或檔案太大。請刪除一些照片後再試。");
  }
}
function unvisitPlace(){
  if(!confirm("要從已造訪地點移除「"+cur.n+"」嗎？"))return;
  delete data[cur.id];
  localStorage.setItem("jsm2",JSON.stringify(data));
  window.JSM_CLOUD?.save?.(data);
  buildMap();updateStats();closeModal();
}
function updateStats(){
  const v=Object.keys(data).length;
  const pct=(v/47*100).toFixed(0);
  document.getElementById("pf").style.width=pct+"%";
  document.getElementById("pt").textContent="已造訪 "+v+" / 47 個都道府縣（"+pct+"%）";
  const rt={},rc={};
  GEO.forEach(p=>{rt[p.r]=(rt[p.r]||0)+1;if(data[p.id])rc[p.r]=(rc[p.r]||0)+1;});
  document.getElementById("rl").innerHTML=Object.keys(rt).map(r=>'<li class="region-row"><span>'+r+'</span><span class="cnt">'+(rc[r]||0)+"/"+rt[r]+"</span></li>").join("");
  const vis=GEO.filter(p=>data[p.id]).sort((a,b)=>a.n.localeCompare(b.n));
  document.getElementById("vl").innerHTML=vis.length===0
    ?'<div class="empty-msg">點選地圖上的都道府縣來刮開它！</div>'
    :vis.map(p=>{const d=data[p.id];return'<div class="vitem" data-id="'+p.id+'"><div class="vdot"></div><span class="vname">'+p.n+"</span>"+(d.note||d.photos?.length||d.places?.length?'<span class="vnote">&#128205;</span>':'')+"</div>";}).join("");
  document.querySelectorAll(".vitem").forEach(el=>{
    el.addEventListener("click",()=>{const p=GEO.find(x=>x.id===+el.dataset.id);if(p)openModal(p);});
  });
}
document.getElementById("mclose").addEventListener("click",closeModal);
document.getElementById("mcancel").addEventListener("click",closeModal);
document.getElementById("msave").addEventListener("click",saveData);
document.getElementById("unvisit").addEventListener("click",unvisitPlace);
document.getElementById("addPlace").addEventListener("click",addPlace);
document.getElementById("placeName").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addPlace();}});
ov.addEventListener("click",e=>{if(e.target===ov)closeModal();});
document.getElementById("zin").addEventListener("click",()=>setZoom(zoomLevel()*1.35));
document.getElementById("zout").addEventListener("click",()=>setZoom(zoomLevel()/1.35));
document.getElementById("zreset").addEventListener("click",resetZoom);
function svgPoint(e){
  const r=svg.getBoundingClientRect();
  return{x:view.x+(e.clientX-r.left)/r.width*view.w,y:view.y+(e.clientY-r.top)/r.height*view.h};
}
function provinceFromTarget(target){
  const el=target?.closest?.("[data-id]")||(target?.dataset?.id?target:null);
  if(!el?.dataset?.id)return null;
  return GEO.find(x=>x.id===+el.dataset.id)||null;
}
function provinceFromEvent(e){
  return provinceFromTarget(e.target)||provinceFromTarget(document.elementFromPoint(e.clientX,e.clientY));
}
svg.addEventListener("wheel",e=>{
  e.preventDefault();
  const p=svgPoint(e);
  setZoom(zoomLevel()*(e.deltaY<0?1.18:1/1.18),p.x,p.y);
},{passive:false});
svg.addEventListener("pointerdown",e=>{
  if(e.button!==0)return;
  const p=svgPoint(e);
  const pref=provinceFromEvent(e);
  drag={sx:e.clientX,sy:e.clientY,x:p.x,y:p.y,vx:view.x,vy:view.y,targetId:pref?.id||""};
  suppressClick=false;
  openedFromPointer=false;
  svg.classList.add("dragging");
  svg.setPointerCapture?.(e.pointerId);
});
svg.addEventListener("pointermove",e=>{
  if(!drag)return;
  const p=svgPoint(e);
  if(Math.hypot(e.clientX-drag.sx,e.clientY-drag.sy)>4)suppressClick=true;
  view.x=drag.vx-(p.x-drag.x);
  view.y=drag.vy-(p.y-drag.y);
  clampView();applyView();
});
svg.addEventListener("pointerup",e=>{
  const targetId=drag?.targetId;
  const wasDrag=suppressClick;
  drag=null;
  svg.classList.remove("dragging");
  svg.releasePointerCapture?.(e.pointerId);
  if(!wasDrag&&targetId){
    const p=GEO.find(x=>x.id===+targetId);
    if(p){openModal(p);openedFromPointer=true;}
  }
});
svg.addEventListener("pointercancel",()=>{drag=null;svg.classList.remove("dragging");});
svg.addEventListener("click",e=>{
  if(suppressClick||openedFromPointer){
    e.preventDefault();e.stopPropagation();suppressClick=false;openedFromPointer=false;return;
  }
  const p=provinceFromEvent(e);
  if(p)openModal(p);
},true);
document.getElementById("uz").addEventListener("click",()=>document.getElementById("fi").click());
document.getElementById("fi").addEventListener("change",async e=>{
  await addPhotoFiles(e.target.files);
  e.target.value="";
});
const uz=document.getElementById("uz");
uz.addEventListener("dragover",e=>{e.preventDefault();uz.style.borderColor="#FF8FB1";});
uz.addEventListener("dragleave",()=>{uz.style.borderColor="#2F2634";});
uz.addEventListener("drop",e=>{
  e.preventDefault();uz.style.borderColor="#2F2634";
  addPhotoFiles(e.dataTransfer.files);
});
function setMapData(nextData){
  data=nextData&&typeof nextData==="object"?nextData:{};
  localStorage.setItem("jsm2",JSON.stringify(data));
  buildMap();updateStats();
}
function getMapData(){return data;}
window.JSM_APP={getMapData,setMapData};
buildMap();updateStats();
</script>

window.JSM_FIREBASE_CONFIG={

<script type="module">
const cfg=window.JSM_FIREBASE_CONFIG||{};
const configured=!!(cfg.apiKey&&cfg.authDomain&&cfg.projectId&&cfg.appId);
const cloudStatus=document.getElementById("cloudStatus");
const cloudUser=document.getElementById("cloudUser");
const googleLogin=document.getElementById("googleLogin");
const googleLogout=document.getElementById("googleLogout");
const groupId=document.getElementById("groupId");
const joinGroup=document.getElementById("joinGroup");
const groupHint=document.getElementById("groupHint");
let auth=null,db=null,currentUser=null,activeGroup=localStorage.getItem("jsmGroupId")||"",unsub=null,applyingRemote=false;
let doc,setDoc,onSnapshot,serverTimestamp;

function setStatus(text){cloudStatus.textContent=text;}
function setUserText(text){cloudUser.textContent=text;}
function cleanGroupId(value){
  return value.trim().toLowerCase().replace(/[^a-z0-9_-]/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"").slice(0,48);
}
function currentMapRef(){
  if(activeGroup)return doc(db,"groups",activeGroup,"maps","shared");
  return doc(db,"users",currentUser.uid,"maps","personal");
}
async function pushCloud(nextData){
  if(!configured||!currentUser||applyingRemote)return;
  const payload={
    data:nextData||{},
    updatedAt:serverTimestamp(),
    updatedBy:currentUser.uid,
    updatedByName:currentUser.displayName||currentUser.email||"Google 使用者"
  };
  if(activeGroup)payload.members={[currentUser.uid]:true};
  try{
    await setDoc(currentMapRef(),payload,{merge:true});
    setStatus(activeGroup?"共享群組已同步":"帳戶已同步");
  }catch(err){
    setStatus("同步失敗");
    groupHint.textContent="雲端同步失敗："+err.message;
  }
}
window.JSM_CLOUD={save:pushCloud};

function stopListen(){
  if(unsub){unsub();unsub=null;}
}
function listenToMap(){
  stopListen();
  if(!currentUser)return;
  setStatus(activeGroup?"共享群組同步中":"帳戶同步中");
  groupHint.textContent=activeGroup
    ?"目前群組："+activeGroup+"。把這個代碼給朋友，他們登入後加入同一群組即可共享。"
    :"未加入共享群組，現在儲存在你的個人帳戶。";
  unsub=onSnapshot(currentMapRef(),snap=>{
    if(snap.exists()){
      applyingRemote=true;
      window.JSM_APP.setMapData(snap.data().data||{});
      applyingRemote=false;
      setStatus(activeGroup?"共享群組已同步":"帳戶已同步");
    }else{
      pushCloud(window.JSM_APP.getMapData());
    }
  },err=>{
    setStatus("同步失敗");
    groupHint.textContent="無法讀取雲端資料："+err.message;
  });
}

if(configured){
  const appMod=await import("https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js");
  const authMod=await import("https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js");
  const fireMod=await import("https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js");
  const {initializeApp}=appMod;
  const {getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}=authMod;
  const {getFirestore}=fireMod;
  ({doc,setDoc,onSnapshot,serverTimestamp}=fireMod);
  const app=initializeApp(cfg);
  auth=getAuth(app);
  db=getFirestore(app);
  if(activeGroup)groupId.value=activeGroup;
  googleLogin.addEventListener("click",()=>signInWithPopup(auth,new GoogleAuthProvider()).catch(err=>{
    setStatus("登入失敗");
    groupHint.textContent="Google 登入失敗："+err.message;
  }));
  googleLogout.addEventListener("click",()=>signOut(auth));
  joinGroup.addEventListener("click",()=>{
    if(!currentUser){
      groupHint.textContent="請先登入 Google，然後再加入共享群組。";
      return;
    }
    activeGroup=cleanGroupId(groupId.value);
    groupId.value=activeGroup;
    localStorage.setItem("jsmGroupId",activeGroup);
    listenToMap();
  });
  onAuthStateChanged(auth,user=>{
    currentUser=user;
    googleLogin.style.display=user?"none":"inline-flex";
    googleLogout.style.display=user?"inline-flex":"none";
    if(user){
      setUserText(user.displayName||user.email||"Google 使用者");
      listenToMap();
    }else{
      stopListen();
      setStatus("本機模式");
      setUserText("尚未登入");
      groupHint.textContent="登入後，儲存會跟隨你的 Google 帳戶。";
    }
  });
}else{
  googleLogin.disabled=true;
  joinGroup.disabled=true;
  setStatus("等待 Firebase 設定");
  setUserText("目前仍使用本機儲存");
  groupHint.textContent="加入 Firebase 專案設定後，這裡就會啟用 Google 登入與共享群組。";
}
</script>
